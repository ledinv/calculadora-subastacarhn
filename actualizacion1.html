<script>
  function bloquearMotorPorVin() {
  const vin = document.getElementById("c13")?.value;
  const motor = document.getElementById("motor");

  if (!motor) return;

  motor.disabled = vin !== "OTROS";
  if (motor.disabled) motor.value = "";
}

const buscarValor = (tabla, valor) => {

    if (valor >= tabla[i][0]) return tabla[i][1];
  }
  return 0;
};
const buscarBuyerFee = c1 =>

const buscarVirtualBidFee = c1 =>

// Función principal de cálculo
function calcular() {
  registrarClic();

  const c1  = parseFloat(document.getElementById('c1').value.trim());
  const c7  = parseFloat(document.getElementById('c7').value.trim());
  const c8  = parseFloat(document.getElementById('c8').value.trim());
  const e2  = parseFloat(document.getElementById('e2').value.trim());
  const c13 = document.getElementById('c13').value;
  const c14 = document.getElementById('c14').value;
  const motor = document.getElementById('motor').value;

  if (!c1 || !c7 || !c8 || !e2 || !c13 || !c14 || (c13 === "OTROS" && !motor)) {
    alert("Por favor completa todos los campos. El campo 'Tipo de Motor' solo aplica si el VIN es OTROS.");
    return;
  }

  const c2 = 15;
  const c3 = buscarVirtualBidFee(c1);
  const c4 = buscarBuyerFee(c1);
  const c5 = 115;
  const c6 = c1 + c2 + c3 + c4 + c5;
  const c9 = c7 + c8;
  const c10 = c6 + c9;
  const c11 = c10 * e2;

  const o3usd = 50;
  const o4usd = c6 * 0.015;
  const o3 = o3usd * e2;
  const o4 = o4usd * e2;

  const tieneCafta = c13 === "1,4,5";

  // === LÓGICA DE AMNISTÍA COMENTADA ===
  // const anio = parseInt(document.getElementById("anio").value);
  // if (anio <= 2005) {
  //   const totalAmnistia = c11 + 20000;
  //   document.getElementById('results').innerHTML = `
  //     <div style="text-align:center;">
  //       <p><strong>Este vehículo aplica para amnistía.</strong></p>
  //       <p><strong>Total Final:</strong> ${formatear(totalAmnistia)}</p>
  //     </div>`;
  //   guardarHistorial([{ titulo: "Vehículo con amnistía", valor: formatear(totalAmnistia) }], formatear(totalAmnistia));
  //   return;
  // }

  let c15 = 0;
  if (!tieneCafta) {
    const baseDAI = c11 + o3 + o4;
    if (c14 === "MAQUINARIA") {
      c15 = baseDAI * 0.05;
    } else if (c14 === "HIBRIDO") {
      c15 = baseDAI * 0.10;
    } else if (["PICK UP", "CAMION", "BUS", "MOTO"].includes(c14)) {
      c15 = baseDAI * 0.10;
    } else if (motor === "1.5 Inferior") {
      c15 = baseDAI * 0.05;
    } else {
      c15 = baseDAI * 0.15;
    }
  }

  let c16 = 0;
  if (c14 === "PICK UP") {
    c16 = 0;
  } else if (c14 === "MOTO") {
    c16 = (c11 + o3 + o4 + c15) * 0.10;
  } else if (c14 === "HIBRIDO") {
    c16 = (c11 + o3 + o4 + c15) * 0.05;
  } else if (["CAMION", "BUS", "MAQUINARIA"].includes(c14)) {
    c16 = 0;
  } else {
    const baseISCusd = c10 + o3usd + o4usd;
    let tasaISC = 0;
    if      (baseISCusd <= 7000)   tasaISC = 0.10;
    else if (baseISCusd <= 10000)  tasaISC = 0.15;
    else if (baseISCusd <= 20000)  tasaISC = 0.20;
    else if (baseISCusd <= 50000)  tasaISC = 0.30;
    else                            tasaISC = 0.45;
    c16 = (c11 + o3 + o4 + c15) * tasaISC;
  }

  let c17 = 0;
  if (c14 !== "MAQUINARIA") {
    c17 = (c11 + c15 + c16 + o3 + o4) * 0.15;
  }

  const c18 = c15 + c16 + c17;
  let c20 = 5000;
  if      (c10 > 15000 && c10 <= 25000) c20 = 7000;
  else if (c10 > 25000)                 c20 = 10000;
  if (c14 === "MAQUINARIA")             c20 = 0;
  const c21 = 4000;
  const c22 = 11000;
  const c23 = 4000;
  const c24 = 55 * e2;
  const c25 = c20 + c21 + c22 + c23 + c24;
  const c26 = c11 + c18 + c25;

  // Preparamos detalles para la cotización
  window._cotizacionDetalles = [
    ['MONTO DE OFERTA',       c1,  'usd'],
    ['ENVIRONMENTAL FEE',     c2,  'usd'],
    ['VIRTUAL BID FEE',       c3,  'usd'],
    ['BUYER FEE',             c4,  'usd'],
    ['GATE Y TITLE PICK FEE', c5,  'usd'],
    ['TOTAL PRECIO SUBASTA',  c6,  'usd'],
    ['VALOR DE BARCO',        c7,  'usd'],
    ['PRECIO DE GRÚA',        c8,  'usd'],
    ['TOTAL DE ENVÍO MARÍTIMO',c9,  'usd'],
    ['TOTAL CIF EN DÓLARES',   c10, 'usd'],
    ['TOTAL CIF EN LEMPIRAS',  c11, 'hnl'],
    ['DAI',                    c15, 'hnl'],
    ['ISC',                    c16, 'hnl'],
    ['ISV',                    c17, 'hnl'],
    ['TOTAL DE IMPUESTOS HONDURAS', c18, 'hnl'],
    ['ECOTASA',                c20, 'hnl'],
    ['ADUANERO',               c21, 'hnl'],
    ['VOTAINER - CONSOLIDADOS HN', c22,'hnl'],
    ['MATRÍCULA Y PLACAS',     c23, 'hnl'],
    ['TRANSFERENCIA INTERNACIONAL', c24,'hnl'],
    ['TOTAL DE GASTOS FIJOS',  c25, 'hnl'],
    ['TOTAL FINAL',            c26, 'hnl']
  ];
  window._cotizacionTotal = c26;
  const detallesFormateados = window._cotizacionDetalles.map(([t, v, tipo]) => ({
  titulo: t,
  valor: tipo === 'usd' ? formatearUSD(v) : formatear(v)
}));
console.log("TOTAL FINAL:", c26);
guardarHistorial(detallesFormateados, formatear(window._cotizacionTotal));

  // Mostramos la cotización en pantalla
  mostrarDetalles();
}

    container.style.display = "block";
    btn.textContent = "Ocultar detalles";

    btn.textContent = "Ver detalles";

}

// Descarga la cotización usando tu CSS externo
function descargarPDF() {
  // Aseguramos que detalles estén visibles al imprimir
  const detalles = document.getElementById("detalleResultados");
  if (detalles.style.display === "none") {
    detalles.style.display = "block";
    document.getElementById("toggleBtn").textContent = "Ocultar detalles";
  }

  const contenido = document.getElementById("results").innerHTML;
  const w = window.open('', '_blank', 'width=900,height=700');
  w.document.open();
  w.document.write(`
    <html>
      <head>
        <title>Cotización SubastaCarHN</title>
        <link rel="stylesheet" href="style.css">
      </head>
      <body>
        ${contenido}
      </body>
    </html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

// Compartir por WhatsApp
function compartirWhatsApp() {
  let texto = "¡Hola! Aquí tienes la cotización de tu vehículo:\n\n";
  window._cotizacionDetalles.forEach(([t, v, tipo]) => {
    texto += `${t}: ${tipo==='usd'?formatearUSD(v):formatear(v)}\n`;
  });
  texto += `\nTotal Final: ${formatear(window._cotizacionTotal)}\n\nCalculado con SUBASTACARHN 👉 https://comocomprarcarros.com`;
  const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
  window.open(url, "_blank");
}

// LLENAR SELECT DE ESTADOS (extraído dinámicamente de todos los tarifarios)
function cargarEstados() {
  const estadoSelect = document.getElementById("estadoSelect");
  estadoSelect.innerHTML = '<option value="">Selecciona un estado</option>';

  const estados = new Set();
  [tarifarioGruasPuertoFlorida, tarifarioGruasPuertoTexas, tarifarioGruasPuertoDelaware].forEach(tarifario => {
    Object.keys(tarifario).forEach(estado => estados.add(estado));
  });

  [...estados].sort().forEach(estado => {
    const option = document.createElement("option");
    option.value = estado;
    option.textContent = estado;
    estadoSelect.appendChild(option);
  });
}
// LLENAR SELECT DE CIUDADES SEGÚN EL ESTADO SELECCIONADO
function cargarCiudades() {
  const estado = document.getElementById("estadoSelect").value;
  const ciudadSelect = document.getElementById("ciudadSelect");
  ciudadSelect.innerHTML = '<option value="">Selecciona una ciudad</option>';

  const ciudades = new Set();

  [tarifarioGruasPuertoFlorida, tarifarioGruasPuertoTexas, tarifarioGruasPuertoDelaware].forEach(tarifario => {
    if (tarifario[estado]) {
      Object.keys(tarifario[estado]).forEach(ciudad => ciudades.add(ciudad));
    }
  });

  [...ciudades].sort().forEach(ciudad => {
    const option = document.createElement("option");
    option.value = ciudad;
    option.textContent = ciudad;
    ciudadSelect.appendChild(option);
  });
}
// MUESTRA PRECIO DE BARCO Y GRÚA SEGÚN ESTADO + CIUDAD + TIPO
function buscarRuta() {
  const estadoSeleccionado = document.getElementById("estadoSelect").value;
  const ciudad = document.getElementById("ciudadSelect").value;
  const tipo = document.getElementById("vehiculoSelect").value;

  const resultadoDiv = document.getElementById("resultadoGrua");
  const barcoText = document.getElementById("precioBarco");
  const gruaText = document.getElementById("precioGrua");
  const errorDiv = document.getElementById("mensajeError");

  let htmlBarco = '';
  let htmlGrua = '';
  let encontrado = false;

  const puertos = [
    { nombre: "Florida", data: tarifarioGruasPuertoFlorida, ciudadBase: "Miami" },
    { nombre: "Texas", data: tarifarioGruasPuertoTexas, ciudadBase: "Houston" },
    { nombre: "Delaware", data: tarifarioGruasPuertoDelaware, ciudadBase: "New Castle" }
  ];

  puertos.forEach(puerto => {
    const tarifario = puerto.data;
    const baseCiudad = puerto.ciudadBase;
    const nombrePuerto = puerto.nombre;

    if (tarifario[estadoSeleccionado] && tarifario[estadoSeleccionado][ciudad]) {
      const valorGrua = tarifario[estadoSeleccionado][ciudad];

      let barco = null;
      if (
        dataGruas[nombrePuerto] &&
        dataGruas[nombrePuerto][baseCiudad] &&
        dataGruas[nombrePuerto][baseCiudad][tipo]
      ) {
        barco = dataGruas[nombrePuerto][baseCiudad][tipo].barco;
      }

      htmlBarco += `🚢 <strong>Barco (${nombrePuerto}):</strong> USD ${barco || 'N/D'}<br>`;
      htmlGrua += `🏗️ <strong>Grúa (${ciudad} - ${nombrePuerto}):</strong> USD ${valorGrua}<br>`;
      encontrado = true;
    }
  });

  if (encontrado) {
    barcoText.innerHTML = htmlBarco;
    gruaText.innerHTML = htmlGrua;
    resultadoDiv.style.display = "block";
    errorDiv.style.display = "none";
  } else {
    resultadoDiv.style.display = "none";
    errorDiv.style.display = "block";
  }
}
